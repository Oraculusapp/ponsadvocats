function App() {
  const [page, setPage] = React.useState('home');
  const [lang, setLang] = React.useState('ca');

  const areas = AREAS_DATA[lang];

  React.useEffect(() => {
    const fromHash = () => {
      const h = (window.location.hash || '#home').slice(1);
      const validIds = ['home', 'contacte', ...AREAS_DATA.ca.map(a => a.id)];
      setPage(validIds.includes(h) ? h : 'home');
      window.scrollTo({ top: 0, behavior: 'instant' });
    };
    fromHash();
    window.addEventListener('hashchange', fromHash);
    return () => window.removeEventListener('hashchange', fromHash);
  }, []);

  React.useEffect(() => {
    document.documentElement.lang = lang;
  }, [lang]);

  const go = (id) => {
    window.location.hash = id;
    setPage(id);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  let pageEl;
  if (page === 'home') pageEl = <HomePage go={go} lang={lang} areas={areas} />;
  else if (page === 'contacte') pageEl = <ContactPage lang={lang} />;
  else pageEl = <AreaPage areaId={page} go={go} lang={lang} areas={areas} />;

  return (
    <div>
      <Header current={page} go={go} lang={lang} setLang={setLang} areas={areas} />
      <main>{pageEl}</main>
      <Footer go={go} lang={lang} areas={areas} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
