<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8" />
<title>Pons Advocats · Granollers</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="description" content="Despatx d'advocats a Granollers especialitzat en dret laboral, penal, familiar, civil i accidents de trànsit. Més de 40 anys d'experiència." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>

<style>
  :root {
    --granate: #8B1A2F;
    --granate-soft: #A8223A;
    --granate-deep: #6B1424;
    --ink: #2C2C2C;
    --ink-2: #555;
    --ink-3: #8a8a87;
    --paper: #FFFFFF;
    --bone: #F5F5F3;
    --bone-2: #ECECE7;
    --rule: #E2E2DC;
    --serif: 'Cormorant Garamond', 'Times New Roman', serif;
    --sans: 'Inter', system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    color: var(--ink);
    background: var(--paper);
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  h1, h2, h3, h4 { font-family: var(--serif); font-weight: 500; letter-spacing: -0.01em; margin: 0; line-height: 1.1; color: var(--ink); }
  p { margin: 0; }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; }
  img { display: block; max-width: 100%; }

  ::selection { background: var(--granate); color: white; }

  .fade-in {
    opacity: 0;
    transform: translateY(8px);
    animation: fadeIn .7s ease forwards;
  }
  @keyframes fadeIn { to { opacity: 1; transform: none; } }

  .container { max-width: 1240px; margin: 0 auto; padding: 0 32px; }
  @media (max-width: 720px) { .container { padding: 0 20px; } }

  .eyebrow {
    font-family: var(--sans);
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--granate);
    font-weight: 500;
  }

  .page-enter { animation: pageIn .45s ease both; }
  @keyframes pageIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  body { overflow-x: hidden; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">

// ─── LOGO ───────────────────────────────────────────────────────────────────
function PonsLogo({ size = 1, light = false, showRule = true }) {
  const w = 220 * size;
  const h = 88 * size;
  const granate = light ? '#FFFFFF' : 'var(--granate)';
  const ink = light ? '#FFFFFF' : 'var(--ink)';
  return (
    <svg viewBox="0 0 220 88" width={w} height={h} role="img" aria-label="Pons Advocats" style={{ display: 'block' }}>
      <rect x="40" y="2" width="178" height="44" fill={granate} />
      <text x="208" y="38" textAnchor="end" fontFamily="Cormorant Garamond, serif" fontWeight="400" fontSize="38" fill="#FFFFFF" fontStyle="italic" style={{ letterSpacing: '-0.02em' }}>pons</text>
      <text x="110" y="68" textAnchor="middle" fontFamily="Inter, sans-serif" fontWeight="300" fontSize="14" fill={ink} style={{ letterSpacing: '0.42em' }}>ADVOCATS</text>
      {showRule && <rect x="20" y="80" width="180" height="1.5" fill={granate} />}
    </svg>
  );
}

// ─── BUTTONS ────────────────────────────────────────────────────────────────
const btnBase = {
  display: 'inline-flex', alignItems: 'center', gap: 10,
  padding: '14px 22px', fontFamily: 'var(--sans)', fontWeight: 500,
  fontSize: 14, letterSpacing: '0.02em', border: '1px solid transparent',
  cursor: 'pointer', transition: 'all .2s ease', textDecoration: 'none', borderRadius: 0,
};

function PrimaryButton({ children, href, onClick, icon, style: s }) {
  const Tag = href ? 'a' : 'button';
  return (
    <Tag href={href} onClick={onClick} style={{ ...btnBase, background: 'var(--granate)', color: 'white', ...s }}
      onMouseEnter={(e) => { e.currentTarget.style.background = 'var(--granate-deep)'; }}
      onMouseLeave={(e) => { e.currentTarget.style.background = 'var(--granate)'; }}>
      {icon}<span>{children}</span>
    </Tag>
  );
}

function GhostButton({ children, href, onClick, icon, light = false, style: s }) {
  const Tag = href ? 'a' : 'button';
  const color = light ? 'white' : 'var(--ink)';
  const border = light ? 'rgba(255,255,255,0.5)' : 'var(--ink)';
  return (
    <Tag href={href} onClick={onClick}
      style={{ ...btnBase, background: 'transparent', color, border: `1px solid ${border}`, ...s }}
      onMouseEnter={(e) => { e.currentTarget.style.background = light ? 'white' : 'var(--ink)'; e.currentTarget.style.color = light ? 'var(--ink)' : 'white'; }}
      onMouseLeave={(e) => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = color; }}>
      {icon}<span>{children}</span>
    </Tag>
  );
}

// ─── PRIMITIVES ─────────────────────────────────────────────────────────────
function Section({ children, bg = 'white', tight = false, id }) {
  const bgs = { white: 'var(--paper)', bone: 'var(--bone)', ink: 'var(--ink)', granate: 'var(--granate)' };
  return (
    <section id={id} style={{ background: bgs[bg] || bg, padding: tight ? '64px 0' : '110px 0', color: bg === 'ink' || bg === 'granate' ? 'white' : 'inherit' }}>
      <div className="container">{children}</div>
    </section>
  );
}

function SectionHead({ eyebrow, title, lead, align = 'left', light = false }) {
  return (
    <div style={{ maxWidth: align === 'center' ? 760 : 720, margin: align === 'center' ? '0 auto 64px' : '0 0 64px', textAlign: align }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 14, justifyContent: align === 'center' ? 'center' : 'flex-start', marginBottom: 18 }}>
        <span style={{ width: 28, height: 1, background: light ? 'rgba(255,255,255,0.6)' : 'var(--granate)' }} />
        <span className="eyebrow" style={{ color: light ? 'rgba(255,255,255,0.85)' : 'var(--granate)' }}>{eyebrow}</span>
      </div>
      <h2 style={{ fontSize: 'clamp(34px, 4.4vw, 54px)', fontWeight: 500, color: light ? 'white' : 'var(--ink)', marginBottom: lead ? 18 : 0 }}>{title}</h2>
      {lead && (
        <p style={{ fontFamily: 'var(--serif)', fontSize: 'clamp(18px, 1.6vw, 22px)', color: light ? 'rgba(255,255,255,0.85)' : 'var(--ink-2)', fontStyle: 'italic', lineHeight: 1.5, fontWeight: 400 }}>{lead}</p>
      )}
    </div>
  );
}

// ─── HEADER ─────────────────────────────────────────────────────────────────
function Header({ current, go }) {
  const [scrolled, setScrolled] = React.useState(false);
  const [mobileOpen, setMobileOpen] = React.useState(false);

  React.useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 6);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const navItems = [
    { id: 'home', label: 'Inici' },
    ...AREAS.map((a) => ({ id: a.id, label: a.label })),
    { id: 'contacte', label: 'Contacte' },
  ];

  return (
    <header style={{
      position: 'sticky', top: 0, zIndex: 50,
      background: 'rgba(255,255,255,0.96)', backdropFilter: 'blur(8px)',
      borderBottom: scrolled ? '1px solid var(--rule)' : '1px solid transparent',
      transition: 'border-color .25s ease',
    }}>
      <div className="container" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '18px 32px' }}>
        <a href="#home" onClick={(e) => { e.preventDefault(); go('home'); }} style={{ display: 'flex', alignItems: 'center' }}>
          <PonsLogo size={0.7} />
        </a>

        <nav className="desktop-nav" style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
          {navItems.map((n) => {
            const active = current === n.id;
            return (
              <a key={n.id} href={`#${n.id}`}
                onClick={(e) => { e.preventDefault(); go(n.id); }}
                style={{ position: 'relative', padding: '10px 14px', fontSize: 13, fontWeight: 500, letterSpacing: '0.04em', textTransform: 'uppercase', color: active ? 'var(--granate)' : 'var(--ink)', transition: 'color .2s' }}
                onMouseEnter={(e) => { if (!active) e.currentTarget.style.color = 'var(--granate)'; }}
                onMouseLeave={(e) => { if (!active) e.currentTarget.style.color = active ? 'var(--granate)' : 'var(--ink)'; }}>
                {n.label}
                {active && <span style={{ position: 'absolute', left: 14, right: 14, bottom: 4, height: 1, background: 'var(--granate)' }} />}
              </a>
            );
          })}
          <a href="tel:+34938707859"
            style={{ marginLeft: 18, display: 'inline-flex', alignItems: 'center', gap: 8, padding: '10px 18px', border: '1px solid var(--granate)', color: 'var(--granate)', fontSize: 13, fontWeight: 500, letterSpacing: '0.02em', transition: 'all .2s' }}
            onMouseEnter={(e) => { e.currentTarget.style.background = 'var(--granate)'; e.currentTarget.style.color = 'white'; }}
            onMouseLeave={(e) => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = 'var(--granate)'; }}>
            <Icon.phone width="14" height="14" /> 93 870 78 59
          </a>
        </nav>

        <button className="mobile-toggle" onClick={() => setMobileOpen(!mobileOpen)}
          style={{ display: 'none', background: 'transparent', border: 'none', padding: 8, cursor: 'pointer', color: 'var(--ink)' }}
          aria-label="Menu">
          {mobileOpen ? <Icon.close /> : <Icon.menu />}
        </button>
      </div>

      {mobileOpen && (
        <div style={{ background: 'white', borderTop: '1px solid var(--rule)', padding: '12px 0 20px' }}>
          <div className="container">
            {navItems.map((n) => {
              const active = current === n.id;
              return (
                <a key={n.id} href={`#${n.id}`}
                  onClick={(e) => { e.preventDefault(); go(n.id); setMobileOpen(false); }}
                  style={{ display: 'block', padding: '14px 0', borderBottom: '1px solid var(--rule)', fontSize: 15, fontWeight: 500, letterSpacing: '0.02em', color: active ? 'var(--granate)' : 'var(--ink)' }}>
                  {n.label}
                </a>

              style={{ display: 'inline-flex', alignItems: 'center', gap: 8, marginTop: 18, padding: '12px 18px', background: 'var(--granate)', color: 'white', fontSize: 14, fontWeight: 500 }}>
              <Icon.phone width="14" height="14" /> 93 870 78 59
            </a>
          </div>
        </div>
      )}

      <style>{`
        @media (max-width: 980px) {
          .desktop-nav { display: none !important; }
          .mobile-toggle { display: inline-flex !important; }
        }
      `}</style>
    </header>
  );
}

// ─── FOOTER ─────────────────────────────────────────────────────────────────

                  onMouseLeave={(e) => e.currentTarget.style.color = 'rgba(255,255,255,0.78)'}>

// ─── APP ─────────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = React.useState('home');

  React.useEffect(() => {
    const fromHash = () => {
      const h = (window.location.hash || '#home').slice(1);
      const valid = ['home', 'contacte', ...AREAS.map(a => a.id)];
      setPage(valid.includes(h) ? h : 'home');
      window.scrollTo({ top: 0, behavior: 'instant' });
    };
    fromHash();
    window.addEventListener('hashchange', fromHash);
    return () => window.removeEventListener('hashchange', fromHash);
  }, []);

  const go = (id) => {
    window.location.hash = id;
    setPage(id);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  let pageEl;
  if (page === 'home') pageEl = <HomePage go={go} />;
  else if (page === 'contacte') pageEl = <ContactPage go={go} />;
  else pageEl = <AreaPage areaId={page} go={go} />;

  return (
    <div>
      <Header current={page} go={go} />
      <main>{pageEl}</main>
      <Footer go={go} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
